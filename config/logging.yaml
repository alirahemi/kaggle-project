version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  json:
    class: structlog.stdlib.ProcessorFormatter
    processor: structlog.processors.JSONRenderer

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

loggers:
  agents:
    level: INFO
    handlers: [console]
    propagate: false
  mcp_servers:
    level: INFO
    handlers: [console]
    propagate: false
  apps:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]
