# MCP server registry — see docs/mcp/MCP_SERVER_SPECIFICATION.md

servers:
  document_mcp:
    name: bureaucracy-document-mcp
    version: "1.0.0"
    transport: stdio
    command: python
    args: ["-m", "mcp_servers.document_mcp.server"]
    auth:
      type: bearer
      env_var: MCP_AUTH_TOKEN

  rag_mcp:
    name: bureaucracy-rag-mcp
    version: "1.0.0"
